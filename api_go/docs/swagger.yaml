            additionalProperties:
              type: string
            type: object
        "503":
          description: AI service not configured
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Identify a piece of music from a photo using Infomaniak AI
      tags:
      - ai
  /v1/authors:
