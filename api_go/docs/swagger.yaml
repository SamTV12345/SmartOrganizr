basePath: /api
definitions:
  controllers.IdentifyMusicRequest:
    properties:
      imageBase64:
        description: |-
          ImageBase64 is the raw base64 payload, *without* the "data:image/..." prefix.
          Frontends that have a data: URL should strip the prefix before sending.
        type: string
      mimeType:
        description: optional; defaults to image/jpeg
        type: string
    required:
    - imageBase64
    type: object
  dto.AttendanceDto:
    properties:
      eventId:
        type: string
      maybeCount:
        type: integer
      noCount:
        type: integer
      rows:
        description: empty if caller may not see others
        items:
          $ref: '#/definitions/dto.AttendanceRowDto'
        type: array
      undecidedCount:
        type: integer
      yesCount:
        type: integer
    type: object
  dto.AttendanceRowDto:
    properties:
      displayName:
        type: string
      reason:
        type: string
      status:
        description: YES|NO|MAYBE|UNDECIDED
        type: string
      userId:
        type: string
    type: object
  dto.Author:
    properties:
      birthYear:
        type: integer
      deathYear:
        type: integer
      extraInformation:
        type: string
      id:
        type: string
      name:
        type: string
      wikidataId:
        type: string
    required:
    - extraInformation
    - id
    - name
    type: object
  dto.AuthorCreateDto:
    properties:
      birthYear:
        type: integer
      deathYear:
        type: integer
      extraInformation:
        type: string
      name:
        type: string
