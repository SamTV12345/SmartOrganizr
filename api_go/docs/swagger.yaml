            $ref: '#/definitions/dto.ClubInvitationPublicDto'
      summary: Get a public club invitation by token
      tags:
      - public
  /public/invitations/{token}/complete:
    post:
      consumes:
      - application/json
      parameters:
      - description: Invitation token
        in: path
        name: token
        required: true
        type: string
      - description: Completion payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ClubInvitationCompleteDto'
      responses:
        "204":
          description: No Content
      summary: Set password and complete a public invitation
