info:
  contact: {}
  description: Backend API for SmartOrganizr.
  title: SmartOrganizr API
  version: "1.0"
paths:
  /public:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.KeycloakModel'
      summary: Public configuration (Keycloak realm/client)
      tags:
      - public
  /public/calendar/{token}.ics:
    get:
      parameters:
      - description: Calendar feed token
        in: path
        name: token
        required: true
        type: string
      produces:
      - text/calendar
      responses:
        "200":
          description: OK
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Public ICS feed of all native club events of the token owner's clubs
        (from 3 months in the past onward). The token is the authentication.
      tags:
      - public
  /public/invitations/{token}:
    get:
      parameters:
