        type: string
    required:
    - extraInformation
    - name
    type: object
  dto.AuthorPatchDto:
    properties:
      birthYear:
        type: integer
      deathYear:
        type: integer
      extraInformation:
        type: string
      name:
        type: string
      wikidataId:
        type: string
    required:
    - extraInformation
    - name
    type: object
  dto.AutocompleteAuthor:
    properties:
      birthYear:
        type: integer
      deathYear:
        type: integer
      description:
        type: string
      id:
        type: string
      name:
        type: string
      wikidataId:
        type: string
    type: object
  dto.AutocompleteAuthorsResponse:
