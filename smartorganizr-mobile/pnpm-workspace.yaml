allowBuilds:
  msgpackr-extract: set this to true or false
  unrs-resolver: set this to true or false
overrides:
  # Security fixes for transitive deps pinned by expo build tooling (uuid via xcode, js-yaml via @expo/xcpretty)
  uuid@^7.0.0: '^11.1.1'
  js-yaml@^4.0.0: '^4.1.2'
  # Security fix: brace-expansion ReDoS (CVE-2025-5889), transitive
  brace-expansion@1: '^1.1.16'
  brace-expansion@2: '^2.1.2'
